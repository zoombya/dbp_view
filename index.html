<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secondary Structure Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Full-screen viewer -->
<div class="viewer">
  <canvas id="glcanvas" style="width:100%;height:100%;display:block;cursor:grab;"></canvas>
  <canvas id="overlaycanvas" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-overlay-inner">
      <i class="bi bi-file-earmark-arrow-up"></i>
      <span>Drop file to load</span>
    </div>
  </div>
  <div class="status" id="status"><strong>IDLE</strong><br>zoom 100%</div>
</div>

<!-- Floating toolbar -->
<div class="toolbar">
  <div class="toolbar-progress"><div id="progressFill" class="toolbar-progress-fill"></div></div>
  <div class="toolbar-row">
    <button class="toolbar-btn" id="tbInput" title="Input data">
      <i class="bi bi-file-text"></i>
    </button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" id="renderBtn" title="Render">
      <i class="bi bi-play-fill"></i>
    </button>
    <button class="toolbar-btn" id="tbLayout" title="Layout: Radial">
      <i class="bi bi-diagram-3"></i>
    </button>
    <button class="toolbar-btn" id="relaxBtn" title="Relax">
      <i class="bi bi-arrow-repeat"></i>
    </button>
    <button class="toolbar-btn" id="tbLive" title="Continuous simulation">
      <i class="bi bi-lightning-fill"></i>
    </button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" id="fitBtn" title="Fit view">
      <i class="bi bi-arrows-fullscreen"></i>
    </button>
    <button class="toolbar-btn" id="resetBtn" title="Reset zoom">
      <i class="bi bi-aspect-ratio"></i>
    </button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" id="tbSettings" title="Settings">
      <i class="bi bi-sliders"></i>
    </button>
    <button class="toolbar-btn" id="cancelBtn" title="Cancel" disabled>
      <i class="bi bi-x-lg"></i>
    </button>
  </div>
</div>

<!-- Hidden progress elements (JS reads/writes these) -->
<div style="display:none">
  <span id="progressTitle"></span>
  <span id="progressBadge" class="badge badge-idle">IDLE</span>
  <span id="progressText"></span>
  <span id="errorBox"></span>
</div>

<!-- Input panel -->
<div class="panel" id="inputPanel">
  <div class="field">
    <label for="inputText">Input structure or file text</label>
    <textarea id="inputText"></textarea>
  </div>
  <div class="row2">
    <div class="field">
      <label for="importFormat">Import format</label>
      <select id="importFormat">
        <option value="auto">Auto-detect</option>
        <option value="raw-structure">Raw structure</option>
        <option value="dbn">Dot-bracket / DBN</option>
        <option value="fasta">FASTA</option>
        <option value="seq">SEQ</option>
        <option value="ct">CT</option>
      </select>
    </div>
    <div class="field">
      <label for="ctIndex">CT structure index</label>
      <input id="ctIndex" type="number" min="1" step="1" value="1">
    </div>
  </div>
  <div style="margin:8px 0">
    <button class="panel-btn" id="importBtn">Import</button>
  </div>
  <div class="panel-section">
    <div class="field">
      <label for="sequenceText">Sequence / strands</label>
      <textarea id="sequenceText"></textarea>
    </div>
    <div class="field">
      <label for="structureText">Structure (dot-bracket-plus)</label>
      <textarea id="structureText"></textarea>
    </div>
  </div>
</div>

<!-- Settings panel -->
<div class="panel" id="settingsPanel">
  <div class="row2">
    <div class="field">
      <label for="layoutMode">Layout mode</label>
      <select id="layoutMode">
        <option value="radial" selected>Radial</option>
        <option value="circular">Circular</option>
        <option value="linear">Linear / arc</option>
      </select>
    </div>
    <div class="field">
      <label for="baseSpacing">Base spacing (px)</label>
      <input id="baseSpacing" type="number" step="1" value="15" min="6">
    </div>
  </div>
  <div class="panel-section">
    <div class="row2">
      <div class="field">
        <label for="selectScope">Click selects</label>
        <select id="selectScope">
          <option value="node">Individual base</option>
          <option value="stem">Stem</option>
          <option value="loop">Loop</option>
          <option value="strand">Strand</option>
        </select>
      </div>
      <div class="field" style="display:flex;flex-direction:column;justify-content:flex-end;">
        <button class="panel-btn" id="clearSelBtn" style="margin:0;width:100%;">Clear selection</button>
      </div>
    </div>
  </div>
  <div class="panel-section">
    <div class="checks">
      <label><input id="showLabels" type="checkbox" checked> Show labels</label>
      <label><input id="showPairs" type="checkbox" checked> Show structure pairs</label>
      <label><input id="showBackbone" type="checkbox" checked> Show backbone</label>
      <label><input id="showEndMarkers" type="checkbox" checked> Show 5&#x2032;/3&#x2032; end markers</label>
      <label><input id="continuousSim" type="checkbox"> Continuous simulation</label>
      <label><input id="autoFit" type="checkbox" checked> Auto-fit after render</label>
      <label><input id="alignCanonical" type="checkbox" checked> Align canonical (5&#x2032;&#x2192;left)</label>
      <label><input id="colorByElement" type="checkbox"> Color by element type</label>
    </div>
    <div class="legend" id="elementLegend" style="display:none;">
      <span class="legend-item"><span class="legend-dot" style="background:#4f46e5"></span>stem</span>
      <span class="legend-item"><span class="legend-dot" style="background:#ea580c"></span>hairpin</span>
      <span class="legend-item"><span class="legend-dot" style="background:#16a34a"></span>internal</span>
      <span class="legend-item"><span class="legend-dot" style="background:#dc2626"></span>junction</span>
      <span class="legend-item"><span class="legend-dot" style="background:#9ca3af"></span>external</span>
    </div>
  </div>
  <details id="radialDetails">
    <summary>Radial refinement (rigid-body)</summary>
    <div class="row3" style="margin-top:10px;">
      <div class="field"><label for="radialTicks">polish ticks</label><input id="radialTicks" type="number" step="50" min="0" value="350"></div>
      <div class="field"><label for="radialCharge">charge</label><input id="radialCharge" type="number" step="5" value="-55"></div>
      <div class="field"><label for="radialCollision">collision r</label><input id="radialCollision" type="number" step="0.5" min="1" value="8.5"></div>
      <div class="field"><label for="radialAlphaDecay">alpha decay</label><input id="radialAlphaDecay" type="number" step="0.001" value="0.018"></div>
      <div class="field"><label for="radialVelocityDecay">vel. decay</label><input id="radialVelocityDecay" type="number" step="0.02" value="0.42"></div>
      <div class="field"><label for="radialBackboneStr">backbone str.</label><input id="radialBackboneStr" type="number" step="0.05" value="0.88"></div>
      <div class="field"><label for="chunkSize">chunk size</label><input id="chunkSize" type="number" step="10" min="1" value="40"></div>
      <div class="field"><label for="loopTension">loop tension</label><input id="loopTension" type="number" step="0.05" min="0" max="1" value="0.9"></div>
    </div>
    <div class="checks" style="margin-top:6px;">
      <label><input id="radialAutoPolish" type="checkbox" checked> Auto-polish after layout</label>
    </div>
  </details>
  <div class="stats" id="stats">Ready.</div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.162/build/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
