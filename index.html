<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secondary Structure Viewer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root{
      --bg:#f3f4f6; --panel:#ffffff; --border:#d1d5db; --text:#111827; --muted:#6b7280;
      --pair:#1d4ed8; --ok:#15803d; --err:#b91c1c; --busy:#2563eb;
    }
    html,body{margin:0;height:100%;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
    .app{display:grid;grid-template-columns:490px 1fr;height:100vh;}
    .sidebar{background:var(--panel);border-right:1px solid var(--border);padding:14px;overflow:auto;}
    .viewer{position:relative;overflow:hidden;}
    svg{width:100%;height:100%;display:block;background:var(--bg);cursor:grab;}
    svg.dragging{cursor:grabbing;}
    h1{font-size:18px;margin:0 0 10px;}
    p{font-size:12px;color:var(--muted);line-height:1.4;margin:0 0 10px;}
    .field{margin-bottom:10px;}
    .field label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;}
    textarea,input,select{
      width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:8px;
      padding:8px 10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;background:#fff;
    }
    textarea{resize:vertical;min-height:92px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
    button{border:1px solid var(--border);background:#fff;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;}
    button:hover{background:#f9fafb;}
    button:disabled{opacity:.55;cursor:not-allowed;}
    details{border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:#fcfcfc;margin-top:10px;}
    summary{cursor:pointer;font-size:12px;font-weight:700;}
    .checks{display:grid;gap:6px;margin-top:8px;}
    .checks label{display:flex;gap:8px;align-items:center;font-size:12px;font-weight:400;}
    .stats{white-space:pre-wrap;border:1px solid var(--border);border-radius:8px;background:#fafafa;padding:10px;font-size:12px;line-height:1.45;margin-top:10px;}
    .status{
      position:absolute;right:12px;bottom:12px;background:rgba(255,255,255,.94);border:1px solid var(--border);
      border-radius:8px;padding:8px 10px;font-size:12px;color:var(--muted);min-width:220px;
    }
    .status strong{color:var(--text);}
    .progress-wrap{margin:10px 0 8px 0;border:1px solid var(--border);background:#fafafa;border-radius:10px;padding:10px;}
    .progress-head{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px;font-size:12px;}
    .badge{padding:3px 8px;border-radius:999px;font-weight:700;font-size:11px;color:white;}
    .badge-idle{background:var(--muted);} .badge-busy{background:var(--busy);}
    .badge-ok{background:var(--ok);} .badge-err{background:var(--err);}
    .bar{width:100%;height:12px;border-radius:999px;background:#e5e7eb;overflow:hidden;}
    .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#2563eb);transition:width .12s linear;}
    .progress-text{margin-top:6px;font-size:11px;color:var(--muted);min-height:28px;white-space:pre-wrap;}
    .error-box{margin-top:8px;border:1px solid #fecaca;background:#fef2f2;color:#991b1b;border-radius:8px;padding:8px 10px;font-size:12px;white-space:pre-wrap;display:none;}
    .backbone{stroke-width:2.2;stroke-linecap:round;}
    .pair{fill:none;stroke:var(--pair);stroke-width:2.0;stroke-linecap:round;opacity:.95;}
    .node{stroke:#111827;stroke-width:.8;}
    .node.selected{stroke:#f59e0b !important;stroke-width:2.5 !important;filter:drop-shadow(0 0 3px #f59e0b88);}
    .label{font-size:10px;text-anchor:middle;dominant-baseline:middle;pointer-events:none;user-select:none;}
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h1>Secondary Structure Viewer</h1>
    <p>
      Visualize RNA secondary structures in radial, circular, or linear layout modes.
      Radial mode uses rigid-body refinement to reduce stem overlap.
    </p>

    <div class="progress-wrap">
      <div class="progress-head">
        <div id="progressTitle">Status</div>
        <div id="progressBadge" class="badge badge-idle">IDLE</div>
      </div>
      <div class="bar"><div id="progressFill" class="bar-fill"></div></div>
      <div id="progressText" class="progress-text">Ready.</div>
      <div id="errorBox" class="error-box"></div>
    </div>

    <div class="field">
      <label for="inputText">Input structure or file text</label>
      <textarea id="inputText"></textarea>
    </div>

    <div class="row2">
      <div class="field">
        <label for="importFormat">Import format</label>
        <select id="importFormat">
          <option value="auto">Auto-detect</option>
          <option value="raw-structure">Raw structure</option>
          <option value="dbn">Dot-bracket / DBN</option>
          <option value="fasta">FASTA</option>
          <option value="seq">SEQ</option>
          <option value="ct">CT</option>
        </select>
      </div>
      <div class="field">
        <label for="ctIndex">CT structure index</label>
        <input id="ctIndex" type="number" min="1" step="1" value="1">
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label for="layoutMode">Layout mode</label>
        <select id="layoutMode">
          <option value="radial" selected>Radial</option>
          <option value="circular">Circular</option>
          <option value="linear">Linear / arc</option>
        </select>
      </div>
      <div class="field">
        <label for="baseSpacing">Base spacing (px)</label>
        <input id="baseSpacing" type="number" step="1" value="16" min="6">
      </div>
    </div>

    <details id="selectionDetails" open>
      <summary>Selection &amp; editing</summary>
      <div class="row2" style="margin-top:8px;">
        <div class="field">
          <label for="selectScope">Click selects</label>
          <select id="selectScope">
            <option value="node">Individual base</option>
            <option value="stem">Stem</option>
            <option value="loop">Loop</option>
            <option value="strand">Strand</option>
          </select>
        </div>
        <div class="field" style="display:flex;flex-direction:column;justify-content:flex-end;">
          <button id="clearSelBtn" style="margin:0;width:100%;">Clear selection</button>
        </div>
      </div>
    </details>

    <div class="controls">
      <button id="importBtn">Import</button>
      <button id="renderBtn">Render</button>
      <button id="relaxBtn">Relax again</button>
      <button id="fitBtn">Fit</button>
      <button id="resetBtn">Reset zoom</button>
      <button id="cancelBtn" disabled>Cancel</button>
    </div>

    <div class="field">
      <label for="sequenceText">Sequence / strands</label>
      <textarea id="sequenceText"></textarea>
    </div>

    <div class="field">
      <label for="structureText">Structure (dot-bracket-plus)</label>
      <textarea id="structureText"></textarea>
    </div>

    <details id="radialDetails">
      <summary>Radial refinement (rigid-body)</summary>
      <div class="row3" style="margin-top:10px;">
        <div class="field"><label for="radialTicks">polish ticks</label><input id="radialTicks" type="number" step="50" min="0" value="350"></div>
        <div class="field"><label for="radialCharge">charge</label><input id="radialCharge" type="number" step="5" value="-55"></div>
        <div class="field"><label for="radialCollision">collision r</label><input id="radialCollision" type="number" step="0.5" min="1" value="8.5"></div>
        <div class="field"><label for="radialAlphaDecay">alpha decay</label><input id="radialAlphaDecay" type="number" step="0.001" value="0.018"></div>
        <div class="field"><label for="radialVelocityDecay">vel. decay</label><input id="radialVelocityDecay" type="number" step="0.02" value="0.42"></div>
        <div class="field"><label for="radialBackboneStr">backbone str.</label><input id="radialBackboneStr" type="number" step="0.05" value="0.88"></div>
        <div class="field"><label for="chunkSize">chunk size</label><input id="chunkSize" type="number" step="10" min="1" value="40"></div>
      </div>
      <div class="checks" style="margin-top:6px;">
        <label><input id="radialAutoPolish" type="checkbox" checked> Auto-polish after layout</label>
      </div>
    </details>

    <div class="checks">
      <label><input id="showLabels" type="checkbox" checked> Show labels</label>
      <label><input id="showPairs" type="checkbox" checked> Show structure pairs</label>
      <label><input id="showBackbone" type="checkbox" checked> Show backbone</label>
      <label><input id="autoFit" type="checkbox" checked> Auto-fit after render</label>
    </div>

    <div class="stats" id="stats">Ready.</div>
  </div>

  <div class="viewer">
    <svg id="svg"></svg>
    <div class="status" id="status"><strong>IDLE</strong><br>zoom 100%</div>
  </div>
</div>

<script>
(() => {
  const STRAND_COLORS = [
    "#0f766e","#2563eb","#9333ea","#b45309","#be123c",
    "#4d7c0f","#0ea5e9","#7c3aed","#059669","#dc2626"
  ];

  const BRACKET_FAMILIES = [
    ["(", ")"], ["[", "]"], ["{", "}"], ["<", ">"],
    ["A", "a"], ["B", "b"], ["C", "c"], ["D", "d"], ["E", "e"], ["F", "f"],
    ["G", "g"], ["H", "h"], ["I", "i"], ["J", "j"], ["K", "k"], ["L", "l"],
    ["M", "m"], ["N", "n"], ["O", "o"], ["P", "p"], ["Q", "q"], ["R", "r"],
    ["S", "s"], ["T", "t"], ["U", "u"], ["V", "v"], ["W", "w"], ["X", "x"],
    ["Y", "y"], ["Z", "z"]
  ];
  const OPENERS = new Set(BRACKET_FAMILIES.map(x => x[0]));
  const CLOSERS = new Map(BRACKET_FAMILIES.map(x => [x[1], x[0]]));

  const el = id => document.getElementById(id);
  const svg = d3.select("#svg");
  const root = svg.append("g");
  const pairLayer = root.append("g");
  const backboneLayer = root.append("g");
  const nodeLayer = root.append("g");
  const labelLayer = root.append("g");

  let width = 1200, height = 900;
  let simulation = null;
  let graph = null;
  let model = emptyModel();
  let pairSel = null, backboneSel = null, nodeSel = null, labelSel = null;
  let currentJobId = 0;
  let cancelRequested = false;
  let selectedNodes = new Set(); // Set of selected node IDs
  let features = null;           // built by buildStructuralFeatures after each render
  let wasDragged = false;        // distinguishes drag from click
  let dragGroupStart = null;     // { initX, initY, positions: Map<id,{x,y}> }

  function emptyModel() {
    return { title:"", sequenceStrands:[], structure:"", importedFormat:"", notes:[] };
  }

  const zoom = d3.zoom()
    .scaleExtent([0.03, 30])
    .on("start", () => svg.classed("dragging", true))
    .on("zoom", (event) => {
      root.attr("transform", event.transform);
      const scalePct = Math.round(event.transform.k * 100);
      const badge = el("progressBadge").textContent;
      el("status").innerHTML = `<strong>${badge}</strong><br>zoom ${scalePct}%`;
    })
    .on("end", () => svg.classed("dragging", false));
  svg.call(zoom);

  function resize() {
    const r = document.querySelector(".viewer").getBoundingClientRect();
    width = r.width;
    height = r.height;
    svg.attr("viewBox", `0 0 ${width} ${height}`);
  }
  window.addEventListener("resize", resize);
  resize();

  function setProgress(state, title, value, text, errorText = "") {
    el("progressTitle").textContent = title;
    el("progressFill").style.width = `${Math.max(0, Math.min(100, value))}%`;
    el("progressText").textContent = text || "";
    const badge = el("progressBadge");
    badge.className = "badge";
    if (state === "busy") { badge.classList.add("badge-busy"); badge.textContent = "BUSY"; }
    else if (state === "ok") { badge.classList.add("badge-ok"); badge.textContent = "DONE"; }
    else if (state === "error") { badge.classList.add("badge-err"); badge.textContent = "FAILED"; }
    else { badge.classList.add("badge-idle"); badge.textContent = "IDLE"; }

    const box = el("errorBox");
    if (errorText) { box.style.display = "block"; box.textContent = errorText; }
    else { box.style.display = "none"; box.textContent = ""; }

    el("status").innerHTML = `<strong>${badge.textContent}</strong><br>${text || "zoom 100%"}`;
  }

  function setBusy(flag) {
    el("cancelBtn").disabled = !flag;
    el("importBtn").disabled = flag;
    el("renderBtn").disabled = flag;
    el("relaxBtn").disabled = flag;
  }

  function stripWs(s) { return (s || "").replace(/\r/g, "").trim(); }
  function cleanSequence(s) { return stripWs(s).replace(/\s+/g, "").replace(/-/g, ""); }
  function placeholderBase() {
    return "N";
  }

  function isLikelyDbLine(line) {
    return /^[.\+\(\)\[\]\{\}<>A-Za-z]+$/.test(line) && /[.()\[\]{}<>A-Za-z]/.test(line);
  }

  function parseFASTA(text) {
    const lines = text.replace(/\r/g, "").split("\n");
    const records = [];
    let title = "", seq = [];
    for (const raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      if (line.startsWith(">")) {
        if (title || seq.length) records.push({title, seq:seq.join("")});
        title = line.slice(1).trim(); seq = [];
      } else seq.push(line);
    }
    if (title || seq.length) records.push({title, seq:seq.join("")});
    return { title:records[0]?.title || "", sequenceStrands:records.map(r => cleanSequence(r.seq)), importedFormat:"fasta" };
  }

  function parseSEQ(text) {
    const lines = text.replace(/\r/g, "").split("\n");
    let i = 0;
    while (i < lines.length && lines[i].trim().startsWith(";")) i++;
    const title = (lines[i] || "").trim();
    i++;
    const seq = lines.slice(i).join("").replace(/\s+/g, "").replace(/1\s*$/, "");
    return { title, sequenceStrands:[seq], importedFormat:"seq" };
  }

  function parseRawStructure(text) {
    const structure = stripWs(text).replace(/\s+/g, "");
    return {
      title:"Raw structure input",
      sequenceStrands:sequenceFromStructure(structure).split("+"),
      structure,
      importedFormat:"raw-structure",
      notes:["No sequence was provided. Inserted placeholder bases."]
    };
  }

  function parseDBN(text) {
    const lines = text.replace(/\r/g, "").split("\n").filter(x => x.trim() !== "");
    if (lines.length === 1 && isLikelyDbLine(lines[0])) return parseRawStructure(lines[0]);
    const title = lines[0]?.startsWith(">") ? lines[0].slice(1).trim() : "";
    const sequence = cleanSequence(lines[1] || "");
    const structure = stripWs(lines[2] || "").replace(/\s+/g, "");
    return { title, sequenceStrands:[sequence], structure, importedFormat:"dbn" };
  }

  function parseCT(text, which = 1) {
    const lines = text.replace(/\r/g, "").split("\n").filter(x => x.trim() !== "");
    const structures = [];
    let i = 0;
    while (i < lines.length) {
      const header = lines[i].trim();
      const m = header.match(/^(\d+)\s+(.*)$/);
      if (!m) break;
      const n = parseInt(m[1], 10);
      const title = m[2] || "";
      const rows = [];
      for (let k = 0; k < n && i + 1 + k < lines.length; k++) rows.push(lines[i + 1 + k].trim().split(/\s+/));
      if (rows.length < n) break;
      structures.push({title, rows});
      i += n + 1;
    }
    const idx = Math.max(1, Math.min(which, structures.length)) - 1;
    const chosen = structures[idx] || {title:"", rows:[]};
    const seq = chosen.rows.map(r => (r[1] || placeholderBase())).join("");
    const pairs = [];
    for (let j = 0; j < chosen.rows.length; j++) {
      const partner = parseInt(chosen.rows[j][4] || "0", 10);
      if (partner > 0 && partner - 1 > j) pairs.push([j, partner - 1]);
    }
    return {
      title:chosen.title,
      sequenceStrands:[seq],
      structure:pairsToBracketString(seq.length, pairs),
      importedFormat:"ct",
      notes:structures.length > 1 ? [`CT contained ${structures.length} structures; loaded structure ${idx + 1}.`] : []
    };
  }

  function autoDetectFormat(text) {
    const t = text.replace(/\r/g, "").trim();
    const lines = t.split("\n").map(x => x.trim()).filter(Boolean);
    if (!lines.length) return "auto";
    if (lines.length === 1 && /^[.\+\(\)\[\]\{\}<>A-Za-z]+$/.test(lines[0])) return "raw-structure";
    if (lines[0].startsWith(">")) {
      if (lines.length >= 3 && isLikelyDbLine(lines[2].replace(/\s+/g, ""))) return "dbn";
      return "fasta";
    }
    if (lines[0].startsWith(";")) return "seq";
    if (/^\d+\s+\S+\s+\d+\s+\d+\s+\d+\s+\d+/.test(lines[1] || "")) return "ct";
    if (lines.every(x => /^[.\+\(\)\[\]\{\}<>A-Za-z]+$/.test(x))) return "dbn";
    return "raw-structure";
  }

  function pairsToBracketString(n, pairs) {
    const chars = Array(n).fill(".");
    for (const [a, b] of pairs.sort((x, y) => (x[0] - y[0]) || (y[1] - x[1]))) {
      let placed = false;
      for (const [op, cl] of BRACKET_FAMILIES) {
        if (chars[a] === "." && chars[b] === ".") {
          chars[a] = op; chars[b] = cl; placed = true; break;
        }
      }
      if (!placed) { chars[a] = "("; chars[b] = ")"; }
    }
    return chars.join("");
  }

  function sequenceFromStructure(structure) {
    const base = placeholderBase();
    return structure.split("+").map(x => base.repeat(x.length)).join("+");
  }

  function normalizeModel() {
    const seq = stripWs(el("sequenceText").value).replace(/\s+/g, "");
    const dbp = stripWs(el("structureText").value).replace(/\s+/g, "");
    model.sequenceStrands = seq ? seq.split("+").map(s => cleanSequence(s)) : [];
    model.structure = dbp || "";
    if (!model.sequenceStrands.length && model.structure) model.sequenceStrands = sequenceFromStructure(model.structure).split("+");
    if (!model.structure && model.sequenceStrands.length) model.structure = model.sequenceStrands.map(s => ".".repeat(s.length)).join("+");
    const seqLen = model.sequenceStrands.reduce((a, s) => a + s.length, 0);
    const structLen = model.structure.replace(/\+/g, "").length;
    if (seqLen && structLen && seqLen !== structLen) model.notes.push(`Sequence length ${seqLen} and structure length ${structLen} differ.`);
    if (!model.structure || structLen === 0) throw new Error("No structure was parsed from the input.");
  }

  function parseDotBracketPlus(sequencePlus, structurePlus) {
    const seqChars = sequencePlus.replace(/\+/g, "").split("");
    const nodes = [], pairLinks = [], backboneLinks = [];
    const stacks = new Map(), pairByNode = new Map(), structureIndexToNode = new Map();
    const nickAfterNode = new Set(), strandNodeIds = [], errors = [];
    let strand = 0, prevNode = null, seqIndex = 0;

    for (let i = 0; i < structurePlus.length; i++) {
      const ch = structurePlus[i];
      if (ch === "+") {
        if (prevNode) nickAfterNode.add(prevNode.id);
        strand += 1; prevNode = null; continue;
      }

      const node = {
        id:nodes.length, strand, structureIndex:i, seq:seqChars[seqIndex] || placeholderBase(),
        label:seqChars[seqIndex] || String(nodes.length + 1),
        x:0, y:0, vx:0, vy:0, fx:null, fy:null
      };
      nodes.push(node);
      if (!strandNodeIds[strand]) strandNodeIds[strand] = [];
      strandNodeIds[strand].push(node.id);
      structureIndexToNode.set(i, node.id);

      if (prevNode && prevNode.strand === node.strand) backboneLinks.push({source:prevNode.id, target:node.id, kind:"backbone"});
      prevNode = node;
      seqIndex++;

      if (OPENERS.has(ch)) {
        if (!stacks.has(ch)) stacks.set(ch, []);
        stacks.get(ch).push(i);
      } else if (CLOSERS.has(ch)) {
        const opener = CLOSERS.get(ch);
        const arr = stacks.get(opener) || [];
        const left = arr.pop();
        if (left == null) errors.push(`Unmatched ${ch} at structure index ${i}.`);
        else {
          const a = structureIndexToNode.get(left), b = node.id;
          pairLinks.push({source:a, target:b, kind:"pair"});
          pairByNode.set(a, b); pairByNode.set(b, a);
        }
      } else if (ch !== ".") errors.push(`Unsupported structure symbol "${ch}" at index ${i}.`);
    }

    for (const [op, arr] of stacks.entries()) {
      for (const idx of arr) errors.push(`Unmatched ${op} at structure index ${idx}.`);
    }

    const stems = buildStems(pairLinks);
    return { nodes, pairLinks, backboneLinks, pairByNode, nickAfterNode, strandNodeIds, errors, stems };
  }

  function buildStems(pairLinks) {
    const pairMap = new Map();
    for (const p of pairLinks) {
      const a = Math.min(p.source, p.target), b = Math.max(p.source, p.target);
      pairMap.set(`${a}:${b}`, {a, b, used:false});
    }
    const ordered = [...pairMap.values()].sort((u, v) => (u.a - v.a) || (v.b - u.b));
    const stems = [];
    for (const p of ordered) {
      if (p.used) continue;
      const stem = [{a:p.a, b:p.b}];
      p.used = true;
      let a = p.a, b = p.b;
      while (pairMap.has(`${a + 1}:${b - 1}`) && !pairMap.get(`${a + 1}:${b - 1}`).used) {
        const q = pairMap.get(`${a + 1}:${b - 1}`);
        q.used = true;
        stem.push({a:q.a, b:q.b});
        a = q.a; b = q.b;
      }
      stems.push(stem);
    }
    return stems;
  }

  function buildStructuralFeatures(graph) {
    const N = graph.nodes.length;
    const pb = graph.pairByNode;
    const nodeToStem = new Map(); // nodeId → stemIndex in graph.stems
    const nodeToLoop = new Map(); // nodeId → loopIndex in loops[]
    const loops = [];             // each: { nodeIds: number[] }

    graph.stems.forEach((stem, si) => {
      for (const p of stem) { nodeToStem.set(p.a, si); nodeToStem.set(p.b, si); }
    });

    function processRegion(lo, hi) {
      const loopId = loops.length;
      loops.push({ nodeIds: [] });
      let i = lo;
      while (i <= hi) {
        const partner = pb.get(i);
        if (partner !== undefined && partner > i && partner <= hi) {
          // stem opening — skip to innermost pair then recurse
          let a = i, b = partner;
          while (a < b && pb.get(a) === b) { a++; b--; }
          processRegion(a, b);
          i = partner + 1;
        } else if (partner !== undefined && partner < lo) {
          i++; // pseudoknot closing from outside — skip
        } else {
          // unpaired or pseudoknot crossing outward — belongs to this loop
          nodeToLoop.set(i, loopId);
          loops[loopId].nodeIds.push(i);
          i++;
        }
      }
    }

    processRegion(0, N - 1);
    return { nodeToStem, nodeToLoop, loops };
  }

  function connectedComponents(n, edges) {
    const adj = Array.from({length:n}, () => []);
    for (const e of edges) {
      adj[e.source].push(e.target);
      adj[e.target].push(e.source);
    }
    const seen = Array(n).fill(false), comps = [];
    for (let i = 0; i < n; i++) {
      if (seen[i]) continue;
      const q = [i], comp = [];
      seen[i] = true;
      while (q.length) {
        const u = q.shift();
        comp.push(u);
        for (const v of adj[u]) if (!seen[v]) { seen[v] = true; q.push(v); }
      }
      comps.push(comp);
    }
    return comps;
  }

  // ─── STATIC LAYOUT ALGORITHMS ────────────────────────────────────────────

  function getLayoutMode() { return el("layoutMode").value; }
  function getBaseSpacing() { return Math.max(6, +el("baseSpacing").value || 16); }

  // Circular layout: all nucleotides equally spaced on a circle, pairs as chords.
  function layoutCircular(graph) {
    const N = graph.nodes.length;
    if (!N) return;
    const BD = getBaseSpacing();
    const nicks = graph.nickAfterNode;
    const NICK_FRAC = nicks.size > 0 ? 0.025 : 0;
    const nickAngle = nicks.size * NICK_FRAC * 2 * Math.PI;
    const availAngle = 2 * Math.PI - nickAngle;
    const anglePerBase = availAngle / Math.max(N, 1);
    const radius = Math.max(60, N * BD / (2 * Math.PI));
    const cx = width / 2, cy = height / 2;
    let a = -Math.PI / 2;
    for (let i = 0; i < N; i++) {
      graph.nodes[i].x = cx + radius * Math.cos(a);
      graph.nodes[i].y = cy + radius * Math.sin(a);
      graph.nodes[i].vx = graph.nodes[i].vy = 0;
      a += anglePerBase;
      if (nicks.has(i)) a += NICK_FRAC * 2 * Math.PI;
    }
  }

  // Linear layout: all nucleotides on a horizontal line, pairs as bezier arcs above.
  function layoutLinear(graph) {
    const BD = getBaseSpacing();
    const NICK_GAP = 3;
    const nicks = graph.nickAfterNode;
    const N = graph.nodes.length;
    const totalWidth = (N - 1) * BD + nicks.size * NICK_GAP * BD;
    const startX = (width - totalWidth) / 2;
    const y = height * 0.68;
    let x = startX;
    for (let i = 0; i < N; i++) {
      graph.nodes[i].x = x;
      graph.nodes[i].y = y;
      graph.nodes[i].vx = graph.nodes[i].vy = 0;
      x += BD;
      if (nicks.has(i)) x += NICK_GAP * BD;
    }
  }

  // Build a recursive loop tree from the graph's pair structure.
  // Returns the list of top-level elements (exterior loop contents).
  function buildRadialTree(graph) {
    const N = graph.nodes.length;
    const pb = graph.pairByNode;

    function parseRegion(lo, hi) {
      const elems = [];
      let i = lo;
      while (i <= hi) {
        const partner = pb.get(i);
        if (partner !== undefined && partner > i && partner <= hi) {
          // Extend stem: consecutive pairs (a,b),(a+1,b-1),...
          const stemPairs = [];
          let a = i, b = partner;
          while (a < b && pb.get(a) === b) { stemPairs.push([a, b]); a++; b--; }
          const inner = parseRegion(a, b);
          elems.push({ kind: 'stem', pairs: stemPairs, inner });
          i = stemPairs[0][1] + 1; // skip past outer closing base
        } else {
          // Unpaired base (or pseudoknot partner outside region – treated as unpaired here)
          if (!(partner !== undefined && partner < i)) {
            elems.push({ kind: 'base', id: i });
          }
          i++;
        }
      }
      return elems;
    }

    return parseRegion(0, N - 1);
  }

  // Place a stem (array of pairs) radiating outward from (parentCx, parentCy)
  // at angle outAngle, starting at distance startR.
  function placeRadialStem(stemElem, parentCx, parentCy, startR, outAngle, BD, PD, minR, nodes) {
    const cosO = Math.cos(outAngle), sinO = Math.sin(outAngle);
    const cosP = Math.cos(outAngle + Math.PI / 2), sinP = Math.sin(outAngle + Math.PI / 2);
    for (let k = 0; k < stemElem.pairs.length; k++) {
      const [a, b] = stemElem.pairs[k];
      const d = startR + k * BD;
      nodes[a].x = parentCx + d * cosO - PD / 2 * cosP;
      nodes[a].y = parentCy + d * sinO - PD / 2 * sinP;
      nodes[b].x = parentCx + d * cosO + PD / 2 * cosP;
      nodes[b].y = parentCy + d * sinO + PD / 2 * sinP;
      nodes[a].vx = nodes[a].vy = nodes[b].vx = nodes[b].vy = 0;
    }
    // Offset inner loop center by the loop's own radius so it doesn't overlap the stem.
    const nInner = stemElem.inner.length;
    const innerLoopR = nInner ? Math.max(minR, (nInner + 2) * BD / (2 * Math.PI)) : minR;
    const innerR = startR + stemElem.pairs.length * BD + innerLoopR;
    placeRadialLoop(stemElem.inner, parentCx, parentCy, innerR, outAngle, BD, PD, minR, nodes, innerLoopR);
  }

  // Place a loop's elements on a circle of computed radius at center (parentCx + innerR*cos, ...).
  function placeRadialLoop(elements, parentCx, parentCy, innerR, entryAngle, BD, PD, minR, nodes, precomputedR) {
    const n = elements.length;
    if (n === 0) return;
    // Circle radius: enough circumference for all elements plus a gap at the entry
    const r = precomputedR || Math.max(minR, (n + 2) * BD / (2 * Math.PI));
    const cx = parentCx + innerR * Math.cos(entryAngle);
    const cy = parentCy + innerR * Math.sin(entryAngle);
    // Spread elements across the arc opposite the entry (leave ~2 slots as entry gap)
    const spread = 2 * Math.PI * n / (n + 2);
    const baseAngle = entryAngle + Math.PI;
    const startAngle = baseAngle - spread / 2;
    elements.forEach((elem, i) => {
      const a = n > 1 ? startAngle + spread * i / (n - 1) : baseAngle;
      if (elem.kind === 'base') {
        nodes[elem.id].x = cx + r * Math.cos(a);
        nodes[elem.id].y = cy + r * Math.sin(a);
        nodes[elem.id].vx = nodes[elem.id].vy = 0;
      } else if (elem.kind === 'stem') {
        placeRadialStem(elem, cx, cy, r, a, BD, PD, minR, nodes);
      }
    });
  }

  // Radial layout: exterior loop on a large circle, stems radiate outward.
  function layoutRadial(graph) {
    const BD = getBaseSpacing();
    const PD = BD * 1.1; // pair strand separation
    const MIN_R = BD * 1.2;
    const nodes = graph.nodes;
    if (!nodes.length) return;

    const tree = buildRadialTree(graph);
    const n = tree.length;
    if (n === 0) return;

    const cx = width / 2, cy = height / 2;
    const extR = Math.max(60, n * BD / (2 * Math.PI));
    const extStep = (2 * Math.PI) / n;

    tree.forEach((elem, i) => {
      const angle = -Math.PI / 2 + i * extStep;
      if (elem.kind === 'base') {
        nodes[elem.id].x = cx + extR * Math.cos(angle);
        nodes[elem.id].y = cy + extR * Math.sin(angle);
        nodes[elem.id].vx = nodes[elem.id].vy = 0;
      } else if (elem.kind === 'stem') {
        placeRadialStem(elem, cx, cy, extR, angle, BD, PD, MIN_R, nodes);
      }
    });
  }

  // Variant of layoutRadial that uses the current node positions as orientation hints.
  // Use when transitioning from an existing layout (e.g. force-directed): every stem
  // and inner loop is rotated to match the direction it currently faces, then snapped
  // to clean radial geometry (fixed pair distances, loop radii). Falls back to
  // layoutRadial when the existing positions have negligible spread (fresh render).
  function layoutRadialFromHints(graph) {
    const BD = getBaseSpacing();
    const PD = BD * 1.1;
    const MIN_R = BD * 1.2;
    const nodes = graph.nodes;
    if (!nodes.length) return;

    // Freeze hint positions before we start writing new ones.
    const hx = nodes.map(n => n.x);
    const hy = nodes.map(n => n.y);

    // Global centroid of hint positions.
    let gcx = 0, gcy = 0;
    hx.forEach(x => gcx += x); gcx /= hx.length;
    hy.forEach(y => gcy += y); gcy /= hy.length;

    // If all nodes are piled on the same spot, fall back to the regular layout.
    const spread = Math.max(...hx.map((x, i) => Math.hypot(x - gcx, hy[i] - gcy)));
    if (spread < 8) { layoutRadial(graph); return; }

    // Centroid of an array of node IDs using hint positions.
    function hintCentroid(ids) {
      if (!ids.length) return { x: gcx, y: gcy };
      let x = 0, y = 0;
      for (const id of ids) { x += hx[id]; y += hy[id]; }
      return { x: x / ids.length, y: y / ids.length };
    }

    // Collect all node IDs in a tree element (recursive).
    function collectIds(elem) {
      const ids = [];
      function visit(e) {
        if (e.kind === 'base') { ids.push(e.id); }
        else { for (const [a, b] of e.pairs) { ids.push(a); ids.push(b); } e.inner.forEach(visit); }
      }
      visit(elem);
      return ids;
    }

    // Place a stem radiating from (parentCx, parentCy) at outAngle — same geometry
    // as placeRadialStem, but calls placeHintLoop for the inner region.
    function placeHintStem(stemElem, parentCx, parentCy, startR, outAngle) {
      const cosO = Math.cos(outAngle), sinO = Math.sin(outAngle);
      const cosP = Math.cos(outAngle + Math.PI / 2), sinP = Math.sin(outAngle + Math.PI / 2);
      for (let k = 0; k < stemElem.pairs.length; k++) {
        const [a, b] = stemElem.pairs[k];
        const d = startR + k * BD;
        nodes[a].x = parentCx + d * cosO - PD / 2 * cosP;
        nodes[a].y = parentCy + d * sinO - PD / 2 * sinP;
        nodes[b].x = parentCx + d * cosO + PD / 2 * cosP;
        nodes[b].y = parentCy + d * sinO + PD / 2 * sinP;
        nodes[a].vx = nodes[a].vy = nodes[b].vx = nodes[b].vy = 0;
      }
      const nInner = stemElem.inner.length;
      const innerLoopR = nInner ? Math.max(MIN_R, (nInner + 2) * BD / (2 * Math.PI)) : MIN_R;
      const innerR = startR + stemElem.pairs.length * BD + innerLoopR;
      placeHintLoop(stemElem.inner, parentCx, parentCy, innerR, outAngle, innerLoopR);
    }

    // Place a loop's elements on a circle at the standard radial geometry, but
    // derive each element's angle from its hint centroid relative to the loop's
    // hint centroid, then rotate the whole group so the mean direction aligns with
    // (entryAngle + PI) — the "far side" opposite the entering stem.
    function placeHintLoop(elements, parentCx, parentCy, innerR, entryAngle, preR) {
      const n = elements.length;
      if (!n) return;
      const r = preR || Math.max(MIN_R, (n + 2) * BD / (2 * Math.PI));
      const cx = parentCx + innerR * Math.cos(entryAngle);
      const cy = parentCy + innerR * Math.sin(entryAngle);

      // Hint centroid of all elements in this loop (the loop's "hint center").
      const allIds = elements.flatMap(e => collectIds(e));
      const hc = hintCentroid(allIds);

      // Raw hint angle of each element from the loop's hint center.
      const rawAngles = elements.map(elem => {
        const c = hintCentroid(collectIds(elem));
        return Math.atan2(c.y - hc.y, c.x - hc.x);
      });

      // Circular mean of raw angles.
      let sx = 0, sy = 0;
      rawAngles.forEach(a => { sx += Math.cos(a); sy += Math.sin(a); });
      const meanRaw = Math.atan2(sy, sx);

      // Rotate so the mean points to the "far side" opposite the entry stem.
      const rot = (entryAngle + Math.PI) - meanRaw;

      elements.forEach((elem, i) => {
        const a = rawAngles[i] + rot;
        if (elem.kind === 'base') {
          nodes[elem.id].x = cx + r * Math.cos(a);
          nodes[elem.id].y = cy + r * Math.sin(a);
          nodes[elem.id].vx = nodes[elem.id].vy = 0;
        } else if (elem.kind === 'stem') {
          placeHintStem(elem, cx, cy, r, a);
        }
      });
    }

    const tree = buildRadialTree(graph);
    if (!tree.length) return;
    const extR = Math.max(60, tree.length * BD / (2 * Math.PI));
    const rootCx = width / 2, rootCy = height / 2;

    // Exterior elements: angle = direction of element's hint centroid from global centroid.
    tree.forEach(elem => {
      const c = hintCentroid(collectIds(elem));
      const a = Math.atan2(c.y - gcy, c.x - gcx);
      if (elem.kind === 'base') {
        nodes[elem.id].x = rootCx + extR * Math.cos(a);
        nodes[elem.id].y = rootCy + extR * Math.sin(a);
        nodes[elem.id].vx = nodes[elem.id].vy = 0;
      } else if (elem.kind === 'stem') {
        placeHintStem(elem, rootCx, rootCy, extR, a);
      }
    });
  }

  // Compute the SVG path `d` attribute for a base pair, depending on layout mode.
  function pairPathD(src, tgt, mode) {
    if (mode === 'linear') {
      const mx = (src.x + tgt.x) / 2;
      const span = Math.abs(tgt.x - src.x);
      const h = Math.max(10, span * 0.5);
      return `M${src.x},${src.y}Q${mx},${src.y - h} ${tgt.x},${tgt.y}`;
    }
    return `M${src.x},${src.y}L${tgt.x},${tgt.y}`;
  }

  // Resolve a link endpoint to a node object whether it's an integer ID (before
  // d3.forceLink initializes) or already a node object (after initialization).
  function linkNode(endpoint) {
    return typeof endpoint === 'number' ? graph.nodes[endpoint] : endpoint;
  }

  function ticked() {
    if (!pairSel) return; // guard: called before first render completes
    const mode = getLayoutMode();
    pairSel.attr("d", d => pairPathD(linkNode(d.source), linkNode(d.target), mode));
    backboneSel.attr("x1", d => linkNode(d.source).x).attr("y1", d => linkNode(d.source).y)
               .attr("x2", d => linkNode(d.target).x).attr("y2", d => linkNode(d.target).y);
    nodeSel.attr("cx", d => d.x).attr("cy", d => d.y);
    labelSel.attr("x", d => d.x).attr("y", d => d.y - 9);
    updateSelectionVisuals();
  }

  function updateStats() {
    const seqLen = model.sequenceStrands.reduce((a, s) => a + s.length, 0);
    const lines = [
      `format: ${model.importedFormat || "manual"}`,
      `title: ${model.title || "-"}`,
      `bases: ${seqLen}`,
      `strands: ${model.sequenceStrands.length}`,
      `pairs: ${graph ? graph.pairLinks.length : 0}`
    ];
    if (graph?.errors.length) lines.push("errors:\n- " + graph.errors.join("\n- "));
    if (model.notes.length) lines.push("notes:\n- " + model.notes.join("\n- "));
    el("stats").textContent = lines.join("\n");
  }

  function fitView() {
    if (!graph || !graph.nodes.length) return;
    const xs = graph.nodes.map(d => d.x), ys = graph.nodes.map(d => d.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const pad = 60;
    const dx = Math.max(1, maxX - minX + 2 * pad), dy = Math.max(1, maxY - minY + 2 * pad);
    const scale = Math.min(30, 0.94 / Math.max(dx / width, dy / height));
    const tx = width / 2 - scale * (minX + maxX) / 2;
    const ty = height / 2 - scale * (minY + maxY) / 2;
    svg.transition().duration(250).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  function resetZoom() { svg.transition().duration(250).call(zoom.transform, d3.zoomIdentity); }

  function updateSelectionVisuals() {
    if (!nodeSel) return;
    nodeSel.classed("selected", d => selectedNodes.has(d.id));
  }

  function nodeClicked(event, d) {
    if (wasDragged) return; // ignore click that followed a real drag
    event.stopPropagation();
    const scope = el("selectScope").value;
    let ids = [d.id];
    if (scope === 'stem') {
      const si = features ? features.nodeToStem.get(d.id) : undefined;
      if (si !== undefined) ids = graph.stems[si].flatMap(p => [p.a, p.b]);
    } else if (scope === 'loop') {
      const li = features ? features.nodeToLoop.get(d.id) : undefined;
      if (li !== undefined) ids = features.loops[li].nodeIds.slice();
    } else if (scope === 'strand') {
      const strandIdx = graph.nodes[d.id].strand;
      ids = graph.strandNodeIds[strandIdx] || ids;
    }
    if (!event.shiftKey) selectedNodes.clear();
    for (const id of ids) {
      if (event.shiftKey && selectedNodes.has(id)) selectedNodes.delete(id);
      else selectedNodes.add(id);
    }
    updateSelectionVisuals();
  }

  function dragStart(event, d) {
    wasDragged = false;
    if (!event.active && simulation) simulation.alphaTarget(0.18).restart();
    const group = selectedNodes.has(d.id) ? [...selectedNodes] : [d.id];
    dragGroupStart = {
      initX: event.x, initY: event.y,
      positions: new Map(group.map(id => [id, { x: graph.nodes[id].x, y: graph.nodes[id].y }]))
    };
    for (const id of dragGroupStart.positions.keys()) {
      graph.nodes[id].fx = graph.nodes[id].x;
      graph.nodes[id].fy = graph.nodes[id].y;
    }
  }
  function dragged(event, d) {
    wasDragged = true;
    if (!dragGroupStart) return;
    const dx = event.x - dragGroupStart.initX, dy = event.y - dragGroupStart.initY;
    for (const [id, pos] of dragGroupStart.positions) {
      graph.nodes[id].fx = pos.x + dx;
      graph.nodes[id].fy = pos.y + dy;
      graph.nodes[id].x = graph.nodes[id].fx;
      graph.nodes[id].y = graph.nodes[id].fy;
    }
    ticked();
  }
  function dragEnd(event, d) {
    if (!event.active && simulation) simulation.alphaTarget(0);
    if (dragGroupStart) {
      for (const id of dragGroupStart.positions.keys()) {
        graph.nodes[id].fx = null; graph.nodes[id].fy = null;
      }
      dragGroupStart = null;
    }
  }

  // ─── STEM RIGIDITY ───────────────────────────────────────────────────────

  // Snapshot the pair distance and backbone step distance for every stem from
  // the current node positions. Called once before relaxation begins so the
  // layout's geometry is used as the rigid target regardless of mode.
  function buildStemRigidConfigs(stems, nodes) {
    return stems.map(stem => {
      const len = stem.length;
      if (!len) return { pairDist: 16, backboneDist: 16 };

      let sumPair = 0;
      for (const p of stem)
        sumPair += Math.hypot(nodes[p.b].x - nodes[p.a].x, nodes[p.b].y - nodes[p.a].y);

      let sumBack = 0, nBack = 0;
      for (let i = 1; i < len; i++) {
        const m0x = (nodes[stem[i-1].a].x + nodes[stem[i-1].b].x) / 2;
        const m0y = (nodes[stem[i-1].a].y + nodes[stem[i-1].b].y) / 2;
        const m1x = (nodes[stem[i].a].x + nodes[stem[i].b].x) / 2;
        const m1y = (nodes[stem[i].a].y + nodes[stem[i].b].y) / 2;
        sumBack += Math.hypot(m1x - m0x, m1y - m0y);
        nBack++;
      }
      return {
        pairDist: sumPair / len,
        backboneDist: nBack > 0 ? sumBack / nBack : sumPair / len
      };
    });
  }

  // After each simulation tick, project every stem's nodes back to their exact
  // rigid-body geometry: the stem may translate and rotate freely, but pair
  // distance and backbone spacing remain locked to the snapshotted values.
  function enforceStemRigidity(stems, nodes, configs) {
    stems.forEach((stem, si) => {
      const len = stem.length;
      if (!len) return;
      const { pairDist, backboneDist } = configs[si];

      // Center of mass of all stem nodes
      let cx = 0, cy = 0;
      for (const p of stem) { cx += nodes[p.a].x + nodes[p.b].x; cy += nodes[p.a].y + nodes[p.b].y; }
      cx /= len * 2; cy /= len * 2;

      // Stem axis: direction from first-pair midpoint to last-pair midpoint
      const m0x = (nodes[stem[0].a].x + nodes[stem[0].b].x) / 2;
      const m0y = (nodes[stem[0].a].y + nodes[stem[0].b].y) / 2;
      const mNx = (nodes[stem[len-1].a].x + nodes[stem[len-1].b].x) / 2;
      const mNy = (nodes[stem[len-1].a].y + nodes[stem[len-1].b].y) / 2;
      let dx = mNx - m0x, dy = mNy - m0y;
      const axLen = Math.hypot(dx, dy);

      if (axLen < 1e-6) {
        // Collapsed stem: derive axis from perpendicular of avg pair direction
        let pdx = 0, pdy = 0;
        for (const p of stem) { pdx += nodes[p.b].x - nodes[p.a].x; pdy += nodes[p.b].y - nodes[p.a].y; }
        const pl = Math.hypot(pdx, pdy) || 1;
        dx = -pdy / pl; dy = pdx / pl;
      } else { dx /= axLen; dy /= axLen; }

      // Pair-perpendicular direction: (-dy, dx), signed to match current a→b orientation
      let dot = 0;
      for (const p of stem)
        dot += (nodes[p.b].x - nodes[p.a].x) * (-dy) + (nodes[p.b].y - nodes[p.a].y) * dx;
      const s = dot >= 0 ? 1 : -1;
      const pX = -dy * s, pY = dx * s;

      // Project each pair to its rigid position along the stem axis
      stem.forEach((p, i) => {
        const along = (i - (len - 1) / 2) * backboneDist;
        const midX = cx + along * dx, midY = cy + along * dy;
        nodes[p.a].x = midX - pairDist / 2 * pX;  nodes[p.a].y = midY - pairDist / 2 * pY;
        nodes[p.b].x = midX + pairDist / 2 * pX;  nodes[p.b].y = midY + pairDist / 2 * pY;
      });
    });
  }

  // ─── RADIAL RIGID-BODY REFINEMENT ────────────────────────────────────────────
  // Each stem is collapsed to a single virtual node (placed at the stem's centre
  // of mass). Loop nodes participate individually. The force simulation runs on
  // this reduced virtual graph, so each stem receives a SINGLE net force and
  // moves as a cluster — not as N independent particles.
  //
  // After every tick we:
  //   1. Translate the entire stem by the virtual-node's displacement.
  //   2. Copy loop-node positions from their virtual nodes.
  //   3. Call enforceStemRigidity to re-lock pair distance & backbone step.
  //   4. Sync the virtual node back to the actual stem centre (round-trip).

  function buildStemVirtualGraph(graph) {
    const nodes = graph.nodes;
    const stems = graph.stems;
    const BD = getBaseSpacing();
    const PD = BD * 1.1;

    // Map every actual node ID to the stem index it belongs to (if any).
    const stemOfNode = new Map();
    stems.forEach((stem, si) => {
      for (const p of stem) { stemOfNode.set(p.a, si); stemOfNode.set(p.b, si); }
    });

    const vNodes = [];

    // One virtual node per stem — centre of mass + extent-based collision radius.
    const stemVN = []; // stemVN[stemIndex] = index in vNodes
    stems.forEach((stem, si) => {
      let cx = 0, cy = 0, count = 0;
      for (const p of stem) {
        cx += nodes[p.a].x + nodes[p.b].x;
        cy += nodes[p.a].y + nodes[p.b].y;
        count += 2;
      }
      stemVN[si] = vNodes.length;
      const halfLen = stem.length * BD / 2;
      vNodes.push({ x: cx / count, y: cy / count, vx: 0, vy: 0,
                    isStem: true, stemIndex: si,
                    cr: Math.hypot(halfLen, PD / 2) + BD * 0.8 });
    });

    // One virtual node per unpaired (loop) node.
    const loopVN = new Map(); // nodeId → index in vNodes
    nodes.forEach((node, id) => {
      if (!stemOfNode.has(id)) {
        loopVN.set(id, vNodes.length);
        vNodes.push({ x: node.x, y: node.y, vx: 0, vy: 0,
                      isStem: false, nodeId: id, cr: BD * 0.55 });
      }
    });

    // Backbone links collapsed to the virtual-node level.
    // Intra-stem links (both endpoints in the same stem) are dropped entirely —
    // the stem's internal geometry is maintained by enforceStemRigidity.
    const seen = new Set();
    const vLinks = [];
    for (const link of graph.backboneLinks) {
      const u = typeof link.source === 'number' ? link.source : link.source.id;
      const v = typeof link.target === 'number' ? link.target : link.target.id;
      const su = stemOfNode.get(u), sv = stemOfNode.get(v);
      const vu = su !== undefined ? stemVN[su] : loopVN.get(u);
      const vv = sv !== undefined ? stemVN[sv] : loopVN.get(v);
      if (vu === undefined || vv === undefined || vu === vv) continue;
      const key = vu < vv ? `${vu}:${vv}` : `${vv}:${vu}`;
      if (seen.has(key)) continue;
      seen.add(key);
      vLinks.push({ source: vu, target: vv });
    }

    return { vNodes, vLinks, stemVN, loopVN };
  }

  // Run the radial rigid-body force simulation using the virtual graph.
  async function relaxRadial(jobId) {
    const ticks = Math.max(0, +el("radialTicks").value || 350);
    if (!ticks) return;
    setProgress("busy", "Radial polish", 35, "Rigid-body overlap removal…");

    const BD      = getBaseSpacing();
    const charge  = +el("radialCharge").value        || -55;
    const aDecay  = +el("radialAlphaDecay").value    || 0.018;
    const vDecay  = +el("radialVelocityDecay").value || 0.42;
    const bStr    = +el("radialBackboneStr").value   || 0.88;
    const chunk   = Math.max(1, +el("chunkSize").value || 40);

    const vg = buildStemVirtualGraph(graph);

    // Snapshot of each stem virtual-node's position at the start of each tick,
    // used to compute the rigid translation delta after the tick.
    const prevX = vg.stemVN.map(vi => vg.vNodes[vi].x);
    const prevY = vg.stemVN.map(vi => vg.vNodes[vi].y);

    const sim = d3.forceSimulation(vg.vNodes)
      .alpha(0.85).alphaDecay(aDecay).velocityDecay(vDecay)
      .force("charge",    d3.forceManyBody().strength(charge))
      .force("collision", d3.forceCollide(d => d.cr).strength(0.85))
      .force("backbone",  d3.forceLink(vg.vLinks).distance(BD * 1.5).strength(bStr))
      .stop();

    simulation = sim;
    const rigidConfigs = buildStemRigidConfigs(graph.stems, graph.nodes);

    let done = 0;
    while (done < ticks) {
      if (jobId !== currentJobId || cancelRequested) throw new Error("Operation cancelled.");
      const n = Math.min(chunk, ticks - done);

      for (let i = 0; i < n; i++) {
        sim.tick();

        // 1. Translate each stem cluster by the delta its virtual node moved.
        graph.stems.forEach((stem, si) => {
          const vn = vg.vNodes[vg.stemVN[si]];
          const dx = vn.x - prevX[si], dy = vn.y - prevY[si];
          for (const p of stem) {
            graph.nodes[p.a].x += dx; graph.nodes[p.a].y += dy;
            graph.nodes[p.b].x += dx; graph.nodes[p.b].y += dy;
          }
        });

        // 2. Copy loop node positions directly from their virtual nodes.
        vg.loopVN.forEach((vi, nodeId) => {
          graph.nodes[nodeId].x = vg.vNodes[vi].x;
          graph.nodes[nodeId].y = vg.vNodes[vi].y;
        });

        // 3. Snap stems to exact rigid geometry (preserves the translated centre).
        enforceStemRigidity(graph.stems, graph.nodes, rigidConfigs);

        // 4. Sync virtual stem nodes back to actual centres so the next tick
        //    starts from consistent positions.
        graph.stems.forEach((stem, si) => {
          let cx = 0, cy = 0;
          for (const p of stem) {
            cx += graph.nodes[p.a].x + graph.nodes[p.b].x;
            cy += graph.nodes[p.a].y + graph.nodes[p.b].y;
          }
          cx /= stem.length * 2; cy /= stem.length * 2;
          const vn = vg.vNodes[vg.stemVN[si]];
          vn.x = cx; vn.y = cy;
          prevX[si] = cx; prevY[si] = cy;
        });
      }

      done += n;
      ticked();
      setProgress("busy", "Radial polish", 35 + 60 * done / ticks,
                  `${done}/${ticks} ticks  α=${sim.alpha().toFixed(3)}`);
      await new Promise(requestAnimationFrame);
    }

    sim.alpha(0); ticked();
  }

  // Smoothly interpolate node positions from current to targetPos over `duration` ms.
  // Cancels early (resolves immediately) if jobId is superseded.
  function animateTransition(nodes, targetPos, duration, jobId) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const startPos = nodes.map(n => ({ x: n.x, y: n.y }));
      function step(now) {
        if (jobId !== currentJobId) { resolve(); return; }
        const t = Math.min((now - startTime) / duration, 1);
        const e = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease-in-out quad
        nodes.forEach((n, i) => {
          n.x = startPos[i].x + (targetPos[i].x - startPos[i].x) * e;
          n.y = startPos[i].y + (targetPos[i].y - startPos[i].y) * e;
        });
        ticked();
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  // Re-lay out the existing graph with the current layout mode, animating the
  // transition from wherever nodes currently are.
  async function relayoutGraph() {
    if (!graph) return;
    const jobId = ++currentJobId;
    cancelRequested = false;
    if (simulation) simulation.stop();
    setBusy(true);
    setProgress("busy", "Layout", 10, "Computing target positions…");
    try {
      const newMode = getLayoutMode();
      const oldPos = graph.nodes.map(n => ({ x: n.x, y: n.y }));

      // Compute target layout (overwrites node x/y temporarily).
      // For radial: use hint-guided placement so stems keep their current
      // orientation (back-converge from any layout into radial).
      if (newMode === 'circular') layoutCircular(graph);
      else if (newMode === 'linear') layoutLinear(graph);
      else if (newMode === 'radial') layoutRadialFromHints(graph);
      const targetPos = graph.nodes.map(n => ({ x: n.x, y: n.y }));

      // Restore old positions and animate to targets.
      graph.nodes.forEach((n, i) => { n.x = oldPos[i].x; n.y = oldPos[i].y; });
      setProgress("busy", "Layout", 40, `Animating to ${newMode} layout…`);
      await animateTransition(graph.nodes, targetPos, 420, jobId);

      // After snapping to radial geometry, run the rigid-body refinement.
      if (newMode === 'radial' && el("radialAutoPolish").checked) {
        if (jobId !== currentJobId || cancelRequested) return;
        await relaxRadial(jobId);
      }

      if (jobId !== currentJobId || cancelRequested) return;
      if (el("autoFit").checked) fitView();
      setProgress("ok", "Layout applied", 100, `${newMode} layout.`);
    } catch (err) {
      if (err.message !== "Operation cancelled.")
        setProgress("error", "Layout failed", 100, "", String(err.message || err));
    } finally { setBusy(false); }
  }

  async function importText() {
    const jobId = ++currentJobId;
    cancelRequested = false;
    setBusy(true);
    setProgress("busy", "Importing", 5, "Reading input...");
    try {
      const text = el("inputText").value.trim();
      let format = el("importFormat").value;
      await new Promise(requestAnimationFrame);
      if (!text) throw new Error("Input is empty.");
      if (format === "auto") {
        setProgress("busy", "Importing", 15, "Detecting format...");
        format = autoDetectFormat(text);
      }

      let parsed = emptyModel();
      setProgress("busy", "Importing", 30, `Parsing as ${format}...`);
      if (format === "fasta") parsed = parseFASTA(text);
      else if (format === "seq") parsed = parseSEQ(text);
      else if (format === "ct") parsed = parseCT(text, parseInt(el("ctIndex").value || "1", 10));
      else if (format === "raw-structure") parsed = parseRawStructure(text);
      else parsed = parseDBN(text);

      if (jobId !== currentJobId || cancelRequested) throw new Error("Operation cancelled.");

      model = { ...emptyModel(), ...parsed, notes:[...(parsed.notes || [])] };
      if (model.sequenceStrands.length) el("sequenceText").value = model.sequenceStrands.join("+");
      if (model.structure) el("structureText").value = model.structure;
      else if (model.sequenceStrands.length) el("structureText").value = model.sequenceStrands.map(s => ".".repeat(s.length)).join("+");

      updateStats();
      setProgress("ok", "Import complete", 100, `Loaded format: ${format}`);
    } catch (err) {
      setProgress("error", "Import failed", 100, "Import aborted.", String(err.message || err));
    } finally { setBusy(false); }
  }

  async function renderGraph() {
    const jobId = ++currentJobId;
    cancelRequested = false;
    setBusy(true);
    setProgress("busy", "Preparing", 5, "Normalizing model...");
    try {
      model.notes = [];
      normalizeModel();
      const sequencePlus = model.sequenceStrands.join("+");
      const structurePlus = model.structure || model.sequenceStrands.map(s => ".".repeat(s.length)).join("+");
      el("sequenceText").value = sequencePlus;
      el("structureText").value = structurePlus;

      if (simulation) simulation.stop();

      setProgress("busy", "Preparing", 18, "Parsing structure...");
      graph = parseDotBracketPlus(sequencePlus, structurePlus);

      const layoutMode = getLayoutMode();
      setProgress("busy", "Preparing", 28, `Applying ${layoutMode} layout...`);
      if (layoutMode === 'circular') {
        layoutCircular(graph);
      } else if (layoutMode === 'linear') {
        layoutLinear(graph);
      } else if (layoutMode === 'radial') {
        layoutRadial(graph);
      }

      pairSel = pairLayer.selectAll("path").data(graph.pairLinks, d => `${d.source}-${d.target}`);
      pairSel.exit().remove();
      pairSel = pairSel.enter().append("path").attr("class", "pair").merge(pairSel)
        .style("display", el("showPairs").checked ? null : "none");

      backboneSel = backboneLayer.selectAll("line").data(graph.backboneLinks, d => `${d.source}-${d.target}`);
      backboneSel.exit().remove();
      backboneSel = backboneSel.enter().append("line").attr("class", "backbone").merge(backboneSel)
        .style("display", el("showBackbone").checked ? null : "none")
        .attr("stroke", d => STRAND_COLORS[graph.nodes[d.source].strand % STRAND_COLORS.length]);

      nodeSel = nodeLayer.selectAll("circle").data(graph.nodes, d => d.id);
      nodeSel.exit().remove();
      nodeSel = nodeSel.enter().append("circle").attr("r", 4.8).attr("class", "node").merge(nodeSel)
        .attr("fill", d => STRAND_COLORS[d.strand % STRAND_COLORS.length])
        .call(d3.drag().on("start", dragStart).on("drag", dragged).on("end", dragEnd))
        .on("click", nodeClicked);

      labelSel = labelLayer.selectAll("text").data(graph.nodes, d => d.id);
      labelSel.exit().remove();
      labelSel = labelSel.enter().append("text").attr("class", "label").merge(labelSel)
        .style("display", el("showLabels").checked ? null : "none")
        .text(d => d.seq || String(d.id + 1));

      ticked();
      updateStats();
      selectedNodes.clear();
      features = buildStructuralFeatures(graph);
      updateSelectionVisuals();
      if (layoutMode === 'radial' && el("radialAutoPolish").checked) {
        await relaxRadial(jobId);
        if (jobId !== currentJobId || cancelRequested) throw new Error("Operation cancelled.");
      }
      if (el("autoFit").checked) fitView();
      setProgress("ok", "Render complete", 100, `Finished.\nNodes ${graph.nodes.length}, pairs ${graph.pairLinks.length}`);
    } catch (err) {
      setProgress("error", "Render failed", 100, "Rendering aborted.", String(err.message || err));
    } finally { setBusy(false); }
  }

  async function relaxAgain() {
    if (!graph) return;
    const jobId = ++currentJobId;
    cancelRequested = false;
    setBusy(true);
    try {
      await relaxRadial(jobId);
      setProgress("ok", "Relax complete", 100, "Additional relaxation complete.");
    } catch (err) {
      setProgress("error", "Relax failed", 100, "Relaxation aborted.", String(err.message || err));
    } finally { setBusy(false); }
  }

  el("cancelBtn").addEventListener("click", () => {
    cancelRequested = true;
    currentJobId += 1;
    if (simulation) simulation.stop();
    setProgress("error", "Cancelled", 100, "Operation cancelled by user.");
    setBusy(false);
  });

  el("importBtn").addEventListener("click", importText);
  el("renderBtn").addEventListener("click", renderGraph);
  el("relaxBtn").addEventListener("click", relaxAgain);
  el("fitBtn").addEventListener("click", fitView);
  el("resetBtn").addEventListener("click", resetZoom);

  el("layoutMode").addEventListener("change", () => {
    el("radialDetails").style.display = getLayoutMode() === 'radial' ? null : "none";
    if (graph) relayoutGraph();
  });

  el("clearSelBtn").addEventListener("click", () => { selectedNodes.clear(); updateSelectionVisuals(); });

  el("showLabels").addEventListener("change", () => { if (labelSel) labelSel.style("display", el("showLabels").checked ? null : "none"); });
  el("showPairs").addEventListener("change", () => { if (pairSel) pairSel.style("display", el("showPairs").checked ? null : "none"); });
  el("showBackbone").addEventListener("change", () => { if (backboneSel) backboneSel.style("display", el("showBackbone").checked ? null : "none"); });
  el("inputText").value = `>tRNA-like example (multi-branch loop)
GCGGAUUUAGCUCAGUUGGGAGAGCGCCAGACUGAAGAUCUGGAGGUCCUGUGUUCGAUCCACAGAAUUCGCACCA
(((((((..((((........)))).(((((.......))))).....(((((.......))))))))))))....`;
  // Show/hide mode-specific panels based on default selection (radial).
  { el("radialDetails").style.display = getLayoutMode() === 'radial' ? null : "none"; }
  setProgress("idle", "Status", 0, "Ready.");
})();
</script>
</body>
